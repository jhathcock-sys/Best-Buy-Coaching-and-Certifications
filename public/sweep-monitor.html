<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stateful Purification Command Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap');
        
        :root {
            --bg-space: #0f111a;
            --bg-obsidian: #161821;
            --bg-panel: #1a1d27;
            --bby-blue: #0046be;
            --bby-yellow: #fff200;
            --success-glow: rgba(0, 255, 128, 0.6);
            --error-glow: rgba(255, 64, 64, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-space);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 1.5rem 2rem;
            background: rgba(15, 17, 26, 0.8);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            margin: 0;
            background: linear-gradient(90deg, #fff, #a0a5b5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 999px;
            background: rgba(0, 255, 128, 0.1);
            border: 1px solid var(--success-glow);
            color: #00ff80;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 0 20px rgba(0, 255, 128, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(0, 255, 128, 0.2); }
            50% { box-shadow: 0 0 25px rgba(0, 255, 128, 0.5); }
            100% { box-shadow: 0 0 10px rgba(0, 255, 128, 0.2); }
        }

        .dashboard {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 1px;
            background: var(--glass-border);
            flex: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--bg-obsidian);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            font-family: 'Outfit', sans-serif;
            color: #a0a5b5;
            margin: 0 0 1rem 0;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.5rem;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        /* Metrics */
        .metric-card {
            background: var(--bg-panel);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .metric-card h4 {
            margin: 0 0 0.5rem 0;
            color: #a0a5b5;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .metric-card .value {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #2a2d3d;
            border-radius: 999px;
            margin-top: 1rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--bby-blue), #00c3ff);
            width: 0%;
            transition: width 0.5s ease-out;
            box-shadow: 0 0 10px var(--bby-blue);
        }

        /* Current Target */
        .target-box {
            background: rgba(255, 242, 0, 0.05);
            border: 1px solid rgba(255, 242, 0, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1rem;
        }

        .target-box h4 {
            color: var(--bby-yellow);
            margin: 0 0 0.5rem 0;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
        }

        .target-file {
            font-family: 'Inter', monospace;
            color: #fff;
            font-size: 1.1rem;
            word-break: break-all;
            font-weight: 600;
        }

        /* Veto Log */
        .veto-item {
            background: rgba(255, 64, 64, 0.05);
            border-left: 4px solid #ff4040;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border-radius: 0 12px 12px 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: transform 0.2s, background 0.2s;
        }

        .veto-item:hover {
            background: rgba(255, 64, 64, 0.08);
            transform: translateX(4px);
        }

        .veto-file {
            font-family: 'Inter', monospace;
            font-weight: 700;
            color: #ff8080;
            font-size: 1rem;
        }

        .veto-reason {
            color: #d0d5e5;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* File Lists */
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .file-item {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            font-family: 'Inter', monospace;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            word-break: break-all;
        }

        .file-item.processed {
            background: rgba(0, 255, 128, 0.05);
            color: #a0a5b5;
            border: 1px solid rgba(0, 255, 128, 0.1);
        }

        .file-item.pending {
            background: var(--bg-panel);
            color: #808595;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .file-icon-success {
            color: #00ff80;
            font-size: 1rem;
        }
        
        .file-icon-pending {
            color: #808595;
            font-size: 1rem;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #3f4459; 
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555b77; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--bby-yellow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            Purification Command Center
        </h1>
        <div class="status-badge" id="sweepStatus">
            <span class="dot">●</span> <span>INITIALIZING</span>
        </div>
    </div>

    <div class="dashboard">
        
        <!-- Left Panel: Metrics & Target -->
        <div class="panel">
            <div class="panel-header">Execution Status</div>
            <div class="panel-content">
                
                <div class="metric-card">
                    <h4>Overall Progress</h4>
                    <p class="value" id="valPercent">0%</p>
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 0.5rem; color: #a0a5b5; font-size: 0.85rem;">
                        <span id="ratioText">0 / 0</span>
                        <span>Files</span>
                    </div>
                </div>

                <div class="metric-card">
                    <h4>Active Interventions</h4>
                    <p class="value" style="color: #ff8080;" id="valVetos">0</p>
                </div>

                <div class="target-box">
                    <h4>Currently Auditing</h4>
                    <div class="target-file" id="valCurrent">Awaiting Target...</div>
                    <div style="margin-top: 1rem; font-size: 0.8rem; color: rgba(255, 255, 255, 0.5); text-transform: uppercase;">Phase 1-5 Active</div>
                </div>

            </div>
        </div>

        <!-- Center Panel: The Veto Log -->
        <div class="panel">
            <div class="panel-header">
                <span>Immutable Veto Log</span>
                <span style="font-size: 0.8rem; background: rgba(255,255,255,0.1); padding: 0.2rem 0.6rem; border-radius: 999px;">Persistent History</span>
            </div>
            <div class="panel-content" id="vetoList">
                <div style="color: #a0a5b5; padding: 2rem; text-align: center; font-family: 'Outfit';">
                    No structural anomalies detected yet.
                </div>
            </div>
        </div>

        <!-- Right Panel: Queue -->
        <div class="panel">
            <div class="panel-header">
                <span>File Manifest</span>
                <span id="queueCount" style="color: #fff;">0 Remaining</span>
            </div>
            <div class="panel-content">
                <ul class="file-list" id="queueList">
                    <!-- Files injected here -->
                </ul>
            </div>
        </div>

    </div>

    <script>
        // Store historical vetos locally in the UI so they don't disappear if the backend clears them
        const persistentVetos = new Set();
        let vetoArray = [];

        async function fetchManifest() {
            try {
                const res = await fetch(`/loop_manifest.json?t=${new Date().getTime()}`);
                if (!res.ok) throw new Error('Manifest not found');
                const data = await res.json();
                updateUI(data);
            } catch (err) {
                console.error("Error fetching manifest:", err);
                const statusEl = document.getElementById('sweepStatus');
                statusEl.innerHTML = '<span style="color: #ff4040;">● OFFLINE / WAITING</span>';
                statusEl.style.borderColor = 'rgba(255, 64, 64, 0.6)';
                statusEl.style.background = 'rgba(255, 64, 64, 0.1)';
                statusEl.style.color = '#ff4040';
            }
        }

        function updateUI(manifest) {
            // Update Status
            const statusEl = document.getElementById('sweepStatus');
            statusEl.innerHTML = `<span class="dot">●</span> <span>${manifest.status}</span>`;
            if (manifest.status === 'ACTIVE') {
                statusEl.style.borderColor = 'rgba(0, 255, 128, 0.6)';
                statusEl.style.color = '#00ff80';
                statusEl.style.background = 'rgba(0, 255, 128, 0.1)';
            } else if (manifest.status === 'COMPLETE') {
                statusEl.style.borderColor = 'var(--bby-blue)';
                statusEl.style.color = '#00c3ff';
                statusEl.style.background = 'rgba(0, 195, 255, 0.1)';
            }

            // Metrics
            const processedCount = manifest.processed_queue ? manifest.processed_queue.length : 0;
            const remainingCount = manifest.remaining_queue ? manifest.remaining_queue.length : 0;
            const totalFiles = processedCount + remainingCount;

            // Merge new vetos into persistent history
            if (manifest.active_vetos && manifest.active_vetos.length > 0) {
                manifest.active_vetos.forEach(v => {
                    if (!persistentVetos.has(v)) {
                        persistentVetos.add(v);
                        vetoArray.unshift(v); // Add to top
                    }
                });
            }

            document.getElementById('valVetos').innerText = persistentVetos.size;

            // Current Target
            const currentPath = manifest.current_checkpoint && manifest.current_checkpoint.file_path 
                ? manifest.current_checkpoint.file_path.split('/').pop() 
                : "Awaiting Next Target...";
            document.getElementById('valCurrent').innerText = currentPath;

            // Progress Bar
            let percent = 0;
            if (totalFiles > 0) {
                percent = Math.round((processedCount / totalFiles) * 100);
            }
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('valPercent').innerText = `${percent}%`;
            document.getElementById('ratioText').innerText = `${processedCount} / ${totalFiles}`;

            // Render Persistent Veto Log
            const vetoList = document.getElementById('vetoList');
            if (vetoArray.length > 0) {
                vetoList.innerHTML = vetoArray.map(v => {
                    // Try to parse out the filename from the start of the string if formatted as "Filename.tsx: Reason"
                    let filename = "Anomaly Detected";
                    let reason = v;
                    if (v.includes(':')) {
                        const parts = v.split(':');
                        filename = parts[0].trim();
                        reason = parts.slice(1).join(':').trim();
                    }

                    return `
                        <div class="veto-item">
                            <div class="veto-file">${filename}</div>
                            <div class="veto-reason">${reason}</div>
                        </div>
                    `;
                }).join('');
            }

            // Render Queue Lists
            const queueList = document.getElementById('queueList');
            document.getElementById('queueCount').innerText = `${remainingCount} Remaining`;
            
            let listHTML = '';
            
            // Show last 5 processed files
            if (manifest.processed_queue) {
                const recentProcessed = manifest.processed_queue.slice(-5).reverse();
                recentProcessed.forEach(path => {
                    listHTML += `
                        <li class="file-item processed">
                            <span class="file-icon-success">✓</span>
                            <span>${path.split('/').pop()}</span>
                        </li>
                    `;
                });
            }

            // Show next 15 pending files
            if (manifest.remaining_queue) {
                const pending = manifest.remaining_queue.slice(0, 15);
                pending.forEach((path, idx) => {
                    listHTML += `
                        <li class="file-item pending" ${idx === 0 ? 'style="border-left: 3px solid var(--bby-yellow);"' : ''}>
                            <span class="file-icon-pending">◷</span>
                            <span ${idx === 0 ? 'style="color: var(--bby-yellow); font-weight: bold;"' : ''}>${path.split('/').pop()}</span>
                        </li>
                    `;
                });
            }

            queueList.innerHTML = listHTML;
        }

        // Poll every 2 seconds
        fetchManifest();
        setInterval(fetchManifest, 2000);
    </script>
</body>
</html>
